<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a4d8f">
<title>AJ's Race Adventure</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', system-ui, sans-serif; }
#app { position:fixed; inset:0; overflow:hidden; }

/* ------- Background ------- */
.bg-sky { position:absolute; inset:0; background: linear-gradient(180deg, #4fc3f7 0%, #81d4fa 40%, #b3e5fc 65%, #c8e6c9 100%); }
.sun { position:absolute; top:5%; right:8%; width:14vmin; height:14vmin; background: radial-gradient(circle at 35% 35%, #fffde7, #ffeb3b 50%, #ffa726); border-radius:50%; box-shadow: 0 0 8vmin #ffeb3b, 0 0 16vmin #ffa726; animation: pulse-sun 3s ease-in-out infinite; }
@keyframes pulse-sun { 0%,100% { transform:scale(1);} 50% { transform:scale(1.08);} }
.cloud { position:absolute; background:white; border-radius:60% 60% 50% 50%; opacity:0.95; box-shadow: 0 0 3vmin rgba(255,255,255,0.7); pointer-events:none; }
.cloud::before, .cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
.cloud::before { width:60%; height:90%; top:-40%; left:15%; }
.cloud::after { width:50%; height:80%; top:-25%; right:10%; }
@keyframes drift { from { transform: translateX(-30vw);} to { transform: translateX(110vw); } }

.bg-ground { position:absolute; bottom:0; left:0; right:0; height:30%; background: linear-gradient(180deg, #66bb6a 0%, #43a047 100%); }
.track { position:absolute; bottom:4%; left:0; right:0; height:22%; background: linear-gradient(180deg, #616161 0%, #424242 100%); border-top: 4px solid #ffeb3b; border-bottom: 4px solid #ffeb3b; box-shadow: inset 0 0 4vmin rgba(0,0,0,0.4); }
.track-dashes { position:absolute; bottom:calc(4% + 11%); left:0; right:0; height:1.2vmin; background: repeating-linear-gradient(90deg, white 0 8vmin, transparent 8vmin 16vmin); animation: scroll-dashes 1s linear infinite; opacity:0.95; }
@keyframes scroll-dashes { from { background-position: 0 0; } to { background-position: -16vmin 0; } }

/* mountains */
.mountain { position:absolute; bottom:30%; width:0; height:0; border-left: 22vmin solid transparent; border-right: 22vmin solid transparent; border-bottom: 28vmin solid #5d4037; opacity:0.7; }
.mountain::before { content:''; position:absolute; top:6vmin; left:-9vmin; width:18vmin; height:0; border-left: 9vmin solid transparent; border-right: 9vmin solid transparent; border-bottom: 8vmin solid #fafafa; }

/* ------- Screens ------- */
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding: 4vmin; }
.screen.active { display:flex; }

/* ------- Title / text ------- */
.title { font-size: 13vmin; font-weight:900; color:#ffeb3b; text-align:center; line-height:0.95; letter-spacing:0.3vmin; -webkit-text-stroke: 1.2vmin #d32f2f; paint-order: stroke fill; text-shadow: 0 0.8vmin 0 #b71c1c, 0 1.6vmin 0 #000, 0 0 6vmin rgba(255,235,59,0.9); animation: title-bounce 2s ease-in-out infinite; }
.title-small { font-size: 8vmin; font-weight:900; color:#fff; text-align:center; -webkit-text-stroke: 0.6vmin #1565c0; paint-order: stroke fill; text-shadow: 0 0.5vmin 0 #000, 0 0 3vmin #4fc3f7; }
@keyframes title-bounce { 0%,100% { transform: scale(1) rotate(-2deg);} 50% { transform: scale(1.05) rotate(2deg);} }

.subtitle { font-size: 6vmin; color:#fff; -webkit-text-stroke: 0.4vmin #000; paint-order: stroke fill; text-shadow: 0 0.4vmin 0 #000, 0 0 3vmin rgba(0,0,0,0.6); margin-top: 2vh; text-align:center; font-weight:900; }

.instruction { font-size: 7vmin; color:#fff; -webkit-text-stroke: 0.5vmin #000; paint-order: stroke fill; text-shadow: 0 0.5vmin 0 #000; font-weight:900; text-align:center; padding: 1vh 3vw; background: linear-gradient(180deg, rgba(255,82,82,0.95), rgba(211,47,47,0.95)); border: 0.5vmin solid #ffeb3b; border-radius: 4vmin; box-shadow: 0 0 4vmin rgba(255,235,59,0.6); }

/* ------- Big buttons ------- */
.btn { padding: 2.2vh 4vw; font-size: 7vmin; font-weight:900; color:white; background: linear-gradient(180deg, #ff5252, #d32f2f); border: 0.6vmin solid #ffeb3b; border-radius: 4vmin; box-shadow: 0 1.2vmin 0 #b71c1c, 0 0 4vmin #ff5252, 0 0 8vmin rgba(255,82,82,0.5); cursor:pointer; -webkit-text-stroke: 0.4vmin #000; paint-order: stroke fill; letter-spacing:0.4vmin; transition: transform 0.08s, box-shadow 0.08s; font-family:inherit; }
.btn:active { transform: translateY(0.6vmin); box-shadow: 0 0.6vmin 0 #b71c1c, 0 0 2vmin #ff5252; }
.btn.green { background: linear-gradient(180deg, #66bb6a, #2e7d32); box-shadow: 0 1.2vmin 0 #1b5e20, 0 0 4vmin #66bb6a; }
.btn.green:active { box-shadow: 0 0.6vmin 0 #1b5e20; }
.btn.blue { background: linear-gradient(180deg, #42a5f5, #1565c0); box-shadow: 0 1.2vmin 0 #0d47a1, 0 0 4vmin #42a5f5; }
.btn.blue:active { box-shadow: 0 0.6vmin 0 #0d47a1; }

.icon-btn { width: 14vmin; height: 14vmin; border-radius: 50%; background: linear-gradient(180deg, #fff, #e0e0e0); border: 0.6vmin solid #1565c0; display:flex; align-items:center; justify-content:center; font-size: 7vmin; box-shadow: 0 0.8vmin 0 #0d47a1, 0 0 3vmin rgba(255,255,255,0.8); cursor:pointer; }
.icon-btn:active { transform: translateY(0.4vmin); box-shadow: 0 0.4vmin 0 #0d47a1; }

.top-bar { position:absolute; top:2vh; left:2vw; right:2vw; display:flex; justify-content:space-between; align-items:center; z-index:50; pointer-events:none; }
.top-bar > * { pointer-events:auto; }

.stars-display { display:flex; gap:1vmin; padding: 1vh 3vw; background: rgba(0,0,0,0.5); border: 0.4vmin solid #ffeb3b; border-radius: 3vmin; font-size: 5vmin; color:#ffeb3b; -webkit-text-stroke: 0.3vmin #000; paint-order: stroke fill; font-weight:900; }

/* ------- Map ------- */
.map { position:relative; width: 90vw; max-width: 700px; height: 80vh; }
.checkpoint { position:absolute; width: 18vmin; height: 18vmin; transform: translate(-50%, -50%); display:flex; align-items:center; justify-content:center; font-size: 8vmin; cursor:pointer; }
.checkpoint .cp-bg { position:absolute; inset:0; background: radial-gradient(circle at 35% 35%, #ffeb3b, #ffa726); border-radius:50%; border: 0.8vmin solid #d32f2f; box-shadow: 0 0 4vmin #ffeb3b, inset 0 0 2vmin rgba(0,0,0,0.3); animation: cp-pulse 2s ease-in-out infinite; }
.checkpoint.locked .cp-bg { background: radial-gradient(circle at 35% 35%, #9e9e9e, #424242); border-color:#212121; box-shadow:none; animation:none; }
.checkpoint.completed .cp-bg { background: radial-gradient(circle at 35% 35%, #69f0ae, #00c853); border-color:#1b5e20; box-shadow: 0 0 4vmin #00e676; }
.checkpoint .cp-content { position:relative; z-index:2; font-weight:900; -webkit-text-stroke: 0.4vmin #000; paint-order: stroke fill; color:white; text-align:center; }
.checkpoint .cp-stars { position:absolute; bottom:-3vmin; left:50%; transform:translateX(-50%); display:flex; gap:0.4vmin; font-size: 3.5vmin; color:#ffeb3b; -webkit-text-stroke: 0.3vmin #000; paint-order: stroke fill; }
@keyframes cp-pulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }

.map-path { position:absolute; inset:0; pointer-events:none; }

/* ------- Game area ------- */
.game-area { position:absolute; inset: 12vh 0 8vh 0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 0 3vw; gap: 3vh; z-index:10; }

.choices { display:flex; gap: 4vmin; flex-wrap:wrap; justify-content:center; }
.choice { cursor:pointer; transform: scale(1); transition: transform 0.15s; filter: drop-shadow(0 0.8vmin 0 rgba(0,0,0,0.5)); }
.choice:active { transform: scale(0.92); }
.choice.bounce { animation: bounce 0.6s ease-in-out infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-1.5vmin);} }
.choice.wrong { animation: shake 0.4s; }
@keyframes shake { 0%,100% { transform: translateX(0);} 25% { transform: translateX(-1.5vmin);} 75% { transform: translateX(1.5vmin);} }
.choice.correct { animation: correct-pop 0.6s; }
@keyframes correct-pop { 0% { transform: scale(1); filter: drop-shadow(0 0.8vmin 0 rgba(0,0,0,0.5));} 50% { transform: scale(1.3); filter: drop-shadow(0 0 6vmin gold);} 100% { transform: scale(1.15); filter: drop-shadow(0 0 4vmin gold);} }
.choice.faded { opacity: 0.3; pointer-events:none; }

.car-svg { width: 30vmin; max-width: 220px; height: auto; }
.car-svg.small { width: 22vmin; max-width: 160px; }
.car-svg.tiny { width: 18vmin; max-width: 130px; }

.big-letter { font-size: 30vmin; font-weight:900; color:#ffeb3b; -webkit-text-stroke: 1.5vmin #d32f2f; paint-order: stroke fill; text-shadow: 0 1vmin 0 #b71c1c, 0 2vmin 0 #000, 0 0 8vmin #ffeb3b; animation: letter-float 2s ease-in-out infinite; line-height:1; }
@keyframes letter-float { 0%,100% { transform: translateY(0) rotate(-3deg);} 50% { transform: translateY(-2vmin) rotate(3deg);} }

.big-number { font-size: 24vmin; font-weight:900; color:#fff; -webkit-text-stroke: 1.2vmin #1565c0; paint-order: stroke fill; text-shadow: 0 0.8vmin 0 #0d47a1, 0 0 6vmin #4fc3f7; line-height:1; }

.choice-letter { width: 22vmin; height: 22vmin; display:flex; align-items:center; justify-content:center; font-size: 14vmin; font-weight:900; color:#fff; background: linear-gradient(180deg, #42a5f5, #1565c0); border: 0.8vmin solid #ffeb3b; border-radius: 5vmin; box-shadow: 0 1vmin 0 #0d47a1, 0 0 4vmin rgba(66,165,245,0.7); -webkit-text-stroke: 0.5vmin #000; paint-order: stroke fill; }
.choice-letter.green { background: linear-gradient(180deg, #66bb6a, #2e7d32); box-shadow: 0 1vmin 0 #1b5e20, 0 0 4vmin rgba(102,187,106,0.7); }
.choice-letter.purple { background: linear-gradient(180deg, #ab47bc, #6a1b9a); box-shadow: 0 1vmin 0 #4a148c, 0 0 4vmin rgba(171,71,188,0.7); }
.choice-letter.orange { background: linear-gradient(180deg, #ffa726, #ef6c00); box-shadow: 0 1vmin 0 #e65100, 0 0 4vmin rgba(255,167,38,0.7); }

.garage { width: 28vmin; height: 22vmin; border-radius: 5vmin 5vmin 1vmin 1vmin; border: 0.8vmin solid #424242; display:flex; align-items:flex-end; justify-content:center; padding-bottom: 1vmin; box-shadow: inset 0 -1vmin 2vmin rgba(0,0,0,0.4); position:relative; cursor:pointer; }
.garage.target { animation: target-glow 1s ease-in-out infinite; }
@keyframes target-glow { 0%,100% { box-shadow: inset 0 -1vmin 2vmin rgba(0,0,0,0.4), 0 0 4vmin gold;} 50% { box-shadow: inset 0 -1vmin 2vmin rgba(0,0,0,0.4), 0 0 8vmin gold;} }

.cards-grid { display:grid; gap: 2vmin; }
.card { width: 22vmin; height: 22vmin; perspective: 800px; cursor:pointer; }
.card-inner { position:relative; width:100%; height:100%; transform-style: preserve-3d; transition: transform 0.5s; }
.card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
.card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius: 3vmin; display:flex; align-items:center; justify-content:center; border: 0.6vmin solid #ffeb3b; box-shadow: 0 0.8vmin 0 #b71c1c; }
.card-back { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
.card-back::before { content:'?'; font-size: 12vmin; color:#ffeb3b; -webkit-text-stroke: 0.5vmin #000; paint-order: stroke fill; font-weight:900; }
.card-front { background: linear-gradient(180deg, #fff, #eeeeee); transform: rotateY(180deg); }
.card.matched .card-front { box-shadow: 0 0 4vmin gold, 0 0.8vmin 0 #b71c1c; }

/* ------- Race level ------- */
.race-screen { position:absolute; inset:0; overflow:hidden; }
.race-track { position:absolute; left:10vw; right:10vw; top:0; bottom:0; background: linear-gradient(180deg, #424242, #212121); border-left: 1vmin solid #ffeb3b; border-right: 1vmin solid #ffeb3b; }
.race-track-lines { position:absolute; inset:0; background: repeating-linear-gradient(180deg, white 0 6vmin, transparent 6vmin 14vmin); width:1vmin; left:50%; transform:translateX(-50%); animation: scroll-down 0.6s linear infinite; }
@keyframes scroll-down { from { background-position: 0 0;} to { background-position: 0 14vmin;} }
.race-finish { position:absolute; left:0; right:0; height: 6vmin; background: repeating-conic-gradient(#000 0% 25%, #fff 25% 50%) 50% / 4vmin 4vmin; border-top: 0.6vmin solid #fff; border-bottom: 0.6vmin solid #fff; transition: top 0.3s; z-index:5; }
.racer { position:absolute; bottom:8vh; width: 22vmin; transition: bottom 0.2s; z-index:10; }
.racer.player { left: 35%; transform: translateX(-50%); }
.racer.opponent { left: 65%; transform: translateX(-50%); }
.tap-zone { position:absolute; inset:0; cursor:pointer; }

/* ------- Catch level ------- */
.falling-letter { position:absolute; font-size: 16vmin; font-weight:900; color:#ffeb3b; -webkit-text-stroke: 0.8vmin #d32f2f; paint-order: stroke fill; text-shadow: 0 0.8vmin 0 #000, 0 0 4vmin #ffeb3b; cursor:pointer; transition: transform 0.2s; line-height:1; }
.falling-letter:active { transform: scale(1.3); }
.falling-letter.caught { animation: caught-poof 0.5s forwards; }
@keyframes caught-poof { from { transform:scale(1); opacity:1;} to { transform:scale(2.5); opacity:0;} }

/* ------- Win overlay ------- */
.win-overlay { position:absolute; inset:0; background: radial-gradient(circle, rgba(255,235,59,0.4), rgba(0,0,0,0.7)); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap: 4vh; }
.win-overlay.active { display:flex; animation: fade-in 0.3s; }
@keyframes fade-in { from { opacity:0;} to { opacity:1;} }
.win-text { font-size: 16vmin; font-weight:900; color:#ffeb3b; -webkit-text-stroke: 1.4vmin #d32f2f; paint-order: stroke fill; text-shadow: 0 1.2vmin 0 #b71c1c, 0 0 8vmin #ffeb3b; animation: win-bounce 0.8s ease-out; }
@keyframes win-bounce { 0% { transform: scale(0) rotate(-180deg);} 60% { transform: scale(1.2) rotate(10deg);} 100% { transform: scale(1) rotate(0);} }
.win-stars { display:flex; gap: 2vmin; }
.win-star { font-size: 14vmin; opacity:0; }
.win-star.show { animation: star-pop 0.5s forwards; }
@keyframes star-pop { 0% { opacity:0; transform: scale(0) rotate(0);} 70% { opacity:1; transform: scale(1.4) rotate(360deg);} 100% { opacity:1; transform: scale(1) rotate(360deg);} }

/* ------- Confetti ------- */
.confetti { position:absolute; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
.confetti-piece { position:absolute; width: 2vmin; height: 3vmin; top:-5vmin; animation: confetti-fall 2.5s linear forwards; }
@keyframes confetti-fall { to { transform: translateY(110vh) rotate(720deg); } }

/* ------- Sound toggle ------- */
.sound-btn { position:fixed; top:2vh; right:2vw; z-index:200; }

/* ------- Car Builder ------- */
.builder-wrap { display:flex; flex-direction:column; align-items:center; gap: 1.5vh; max-height: 84vh; overflow-y: auto; padding: 1vh 0; width: 100%; }
.builder-preview { filter: drop-shadow(0 0 4vmin rgba(255,235,59,0.6)); animation: title-bounce 3s ease-in-out infinite; }
.builder-row { display:flex; flex-direction:column; align-items:center; gap: 0.6vh; width: 100%; }
.builder-label { font-size: 4vmin; font-weight:900; color:#fff; -webkit-text-stroke: 0.4vmin #000; paint-order: stroke fill; letter-spacing: 0.3vmin; }
.builder-swatches { display:flex; gap: 1.5vmin; flex-wrap: wrap; justify-content:center; padding: 0 2vw; }
.swatch { width: 11vmin; height: 11vmin; border-radius: 50%; border: 0.6vmin solid #1565c0; box-shadow: 0 0.6vmin 0 #0d47a1; cursor:pointer; transition: transform 0.1s; }
.swatch:active { transform: scale(0.92); }
.swatch.selected { border-color: #ffeb3b; box-shadow: 0 0.6vmin 0 #b71c1c, 0 0 3vmin gold; transform: scale(1.1); }
.swatch.num { display:flex; align-items:center; justify-content:center; font-size: 7vmin; font-weight:900; color:#fff; -webkit-text-stroke: 0.4vmin #000; paint-order: stroke fill; background: linear-gradient(180deg,#42a5f5,#1565c0); }

/* ------- Trace level ------- */
.trace-svg { width: 70vmin; max-width: 480px; height: 70vmin; max-height: 480px; touch-action: none; }
.trace-outline { fill: none; stroke: #fff; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; stroke-dasharray: 6 8; }
.trace-progress { fill: none; stroke: #ffeb3b; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 2vmin #ffeb3b); }
.trace-dot { fill: #fff; stroke: #1565c0; stroke-width: 3; }
.trace-dot.active { fill: #ffeb3b; stroke: #d32f2f; animation: cp-pulse 1s ease-in-out infinite; filter: drop-shadow(0 0 1.5vmin gold); }
.trace-dot.done { fill: #66bb6a; stroke: #1b5e20; }
.trace-arrow { font-size: 6vmin; fill: #d32f2f; }

/* ------- Number line level ------- */
.numline { display:flex; gap:1.5vmin; flex-wrap:wrap; justify-content:center; max-width: 90vw; padding: 2vh 2vw; }
.numline-cell { width: 14vmin; height: 14vmin; display:flex; align-items:center; justify-content:center; font-size: 8vmin; font-weight:900; color:#fff; background: linear-gradient(180deg,#42a5f5,#1565c0); border: 0.6vmin solid #ffeb3b; border-radius: 3vmin; box-shadow: 0 0.8vmin 0 #0d47a1; -webkit-text-stroke: 0.4vmin #000; paint-order: stroke fill; cursor:pointer; transition: transform 0.15s; }
.numline-cell.target { animation: target-glow 0.8s ease-in-out infinite; transform: scale(1.1); }
.numline-cell.done { background: linear-gradient(180deg,#66bb6a,#2e7d32); box-shadow: 0 0.8vmin 0 #1b5e20, 0 0 3vmin gold; }
.numline-cell.wrong { animation: shake 0.4s; }

/* ------- Drive level ------- */
.drive-screen { position:absolute; inset:0; overflow:hidden; }
.drive-road { position:absolute; left:8vw; right:8vw; top:0; bottom:0; background: linear-gradient(180deg,#424242,#212121); border-left: 1vmin solid #ffeb3b; border-right: 1vmin solid #ffeb3b; }
.drive-lane-line { position:absolute; top:0; bottom:0; width: 0.8vmin; background: repeating-linear-gradient(180deg, white 0 6vmin, transparent 6vmin 14vmin); animation: scroll-down 0.6s linear infinite; }
.drive-car { position:absolute; bottom: 8vh; width: 22vmin; transform: translateX(-50%); transition: left 0.18s ease-out; z-index:10; }
.drive-coin { position:absolute; width: 12vmin; height: 12vmin; transform: translateX(-50%); display:flex; align-items:center; justify-content:center; font-size: 9vmin; z-index: 5; pointer-events:none; }
.drive-coin.collected { animation: caught-poof 0.4s forwards; }
.drive-tap-left, .drive-tap-right { position:absolute; top:0; bottom:0; width:50%; cursor:pointer; z-index: 20; }
.drive-tap-left { left:0; }
.drive-tap-right { right:0; }
.drive-arrow { position:absolute; bottom: 14vh; font-size: 12vmin; opacity: 0.55; pointer-events:none; animation: drive-arrow-bounce 0.8s ease-in-out infinite; z-index: 15; }
.drive-arrow.left { left: 6vw; }
.drive-arrow.right { right: 6vw; }
@keyframes drive-arrow-bounce { 0%,100% { transform: scale(1);} 50% { transform: scale(1.15);} }

/* ------- Misc ------- */
.hidden { display:none !important; }
.flex-row { display:flex; flex-direction:row; gap: 3vmin; align-items:center; justify-content:center; flex-wrap:wrap; }
.flex-col { display:flex; flex-direction:column; gap: 3vh; align-items:center; justify-content:center; }

</style>
</head>
<body>
<div id="app">

  <!-- Background -->
  <div class="bg-sky"></div>
  <div class="sun"></div>
  <div id="clouds"></div>
  <div class="mountain" style="left: 5%;"></div>
  <div class="mountain" style="left: 65%; transform: scale(0.8);"></div>
  <div class="bg-ground"></div>
  <div class="track"></div>
  <div class="track-dashes"></div>

  <!-- Sound toggle -->
  <div class="sound-btn icon-btn" id="soundBtn" onclick="toggleSound()">🔊</div>

  <!-- Home screen -->
  <div class="screen active" id="screen-home">
    <div class="title">AJ'S<br>RACE!</div>
    <div class="subtitle" style="margin: -1vh 0 1vh 0;">⭐ Hi AJ! ⭐</div>
    <div id="home-car" style="margin: 2vh 0;"></div>
    <button class="btn" onclick="startGame()">▶ PLAY</button>
    <button class="btn blue" style="margin-top: 2vh; font-size: 5vmin;" onclick="showCarBuilder()">🚗 BUILD MY CAR</button>
  </div>

  <!-- Car builder -->
  <div class="screen" id="screen-builder">
    <div class="top-bar">
      <div class="icon-btn" onclick="goHome()">🏠</div>
      <div class="title-small">BUILD YOUR CAR!</div>
      <div style="width: 14vmin;"></div>
    </div>
    <div class="builder-wrap" id="builderWrap"></div>
  </div>

  <!-- Map screen -->
  <div class="screen" id="screen-map">
    <div class="top-bar">
      <div class="icon-btn" onclick="goHome()">🏠</div>
      <div class="title-small">PICK A LEVEL</div>
      <div style="width: 14vmin;"></div>
    </div>
    <div class="map" id="map"></div>
  </div>

  <!-- Level screen -->
  <div class="screen" id="screen-level">
    <div class="top-bar">
      <div class="icon-btn" onclick="goMap()">🗺️</div>
      <div class="instruction" id="instruction">Tap the A!</div>
      <div class="stars-display" id="progressDisplay">⭐ 0/5</div>
    </div>
    <div class="game-area" id="gameArea"></div>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-text" id="winText">GREAT JOB!</div>
    <div class="win-stars" id="winStars"></div>

<script>
// ========================= AUDIO =========================
const Audio = {
  ctx: null, musicGain: null, sfxGain: null, musicTimer: null, muted: false,
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.06;
      this.musicGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.25;
      this.sfxGain.connect(this.ctx.destination);
    } catch(e) {}
  },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  beep(freq, dur, type='square', when=0, gain=0.3) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + when;
    const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(this.sfxGain);
    osc.start(t); osc.stop(t + dur + 0.05);
  },
  slide(f1, f2, dur, type='square', gain=0.3) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f1, t);
    osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(this.sfxGain);
    osc.start(t); osc.stop(t + dur + 0.05);
  },
  win() { [523, 659, 784, 1047, 1319].forEach((f, i) => this.beep(f, 0.18, 'square', i * 0.09, 0.4)); },
  star() { this.beep(880, 0.08, 'sine', 0, 0.3); this.beep(1320, 0.12, 'sine', 0.05, 0.3); },
  good() { this.beep(660, 0.08, 'square', 0, 0.3); this.beep(880, 0.12, 'square', 0.07, 0.3); this.beep(1175, 0.16, 'square', 0.14, 0.3); },
  wrong() { this.slide(300, 150, 0.25, 'sawtooth', 0.2); },
  tap() { this.beep(660, 0.04, 'square', 0, 0.18); },
  honk() { this.slide(440, 660, 0.12, 'square', 0.3); this.slide(660, 440, 0.12, 'square', 0.3); },
  vroom() { this.slide(80, 180, 0.4, 'sawtooth', 0.2); },
  speak(text, opts={}) {
    if (!window.speechSynthesis || this.muted) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = opts.rate || 0.92;
      u.pitch = opts.pitch || 1.25;
      u.volume = opts.volume || 1;
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v => /samantha|karen|allison|google us english|female/i.test(v.name)) || voices[0];
      if (preferred) u.voice = preferred;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  },
  startMusic() {
    if (!this.ctx || this.musicTimer || this.muted) return;
    const C=261.63,D=293.66,E=329.63,F=349.23,G=392,A=440,B=493.88,C2=523.25,D2=587.33,E2=659.25;
    const melody = [
      [E2,0.18],[G,0.18],[C2,0.18],[E2,0.18],[D2,0.36],
      [C2,0.18],[E2,0.18],[G,0.36],[0,0.18],
      [F,0.18],[A,0.18],[C2,0.18],[F,0.18],[E,0.36],
      [D,0.18],[F,0.18],[A,0.36],[0,0.18],
      [G,0.18],[B,0.18],[D2,0.18],[G,0.18],[F,0.36],
      [E,0.18],[D,0.18],[C,0.36],[0,0.36]
    ];
    let idx = 0;
    const playNext = () => {
      if (this.muted || !this.ctx) { this.musicTimer = null; return; }
      const [freq, dur] = melody[idx];
      if (freq > 0) {
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
        osc.type = 'square'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.5, t + 0.015);
        g.gain.linearRampToValueAtTime(0.4, t + dur * 0.7);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.95);
        osc.connect(g); g.connect(this.musicGain);
        osc.start(t); osc.stop(t + dur);
        const bass = this.ctx.createOscillator(), bg = this.ctx.createGain();
        bass.type = 'triangle'; bass.frequency.value = freq / 2;
        bg.gain.setValueAtTime(0.35, t);
        bg.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        bass.connect(bg); bg.connect(this.musicGain);
        bass.start(t); bass.stop(t + dur);
      }
      idx = (idx + 1) % melody.length;
      this.musicTimer = setTimeout(playNext, dur * 1000);
    };
    playNext();
  },
  stopMusic() { if (this.musicTimer) clearTimeout(this.musicTimer); this.musicTimer = null; }
};

function toggleSound() {
  Audio.muted = !Audio.muted;

}

const NUM_LEVELS = 13;

const State = {
  currentLevel: 0,
  stars: new Array(NUM_LEVELS).fill(0),
  unlockedUpTo: 0,
  playerColor: '#e53935',
  playerAccent: '#ffeb3b',
  playerWheel: '#9e9e9e',
  playerNumber: '3',
  load() {
    try {
      const s = JSON.parse(localStorage.getItem('aj-race-state') || '{}');
      if (Array.isArray(s.stars)) {
        this.stars = new Array(NUM_LEVELS).fill(0).map((_, i) => s.stars[i] || 0);
      }
      if (typeof s.unlockedUpTo === 'number') this.unlockedUpTo = Math.min(s.unlockedUpTo, NUM_LEVELS - 1);
      if (typeof s.playerColor === 'string') this.playerColor = s.playerColor;
      if (typeof s.playerAccent === 'string') this.playerAccent = s.playerAccent;
      if (typeof s.playerWheel === 'string') this.playerWheel = s.playerWheel;
      if (typeof s.playerNumber === 'string') this.playerNumber = s.playerNumber;
    } catch(e) {}
  },
  save() {
    try {
      localStorage.setItem('aj-race-state', JSON.stringify({
        stars: this.stars, unlockedUpTo: this.unlockedUpTo,
        playerColor: this.playerColor, playerAccent: this.playerAccent,
        playerWheel: this.playerWheel, playerNumber: this.playerNumber
      }));
    } catch(e) {}
  },
  playerCarOpts(extra={}) {
    return Object.assign({
      color: this.playerColor,
      accent: this.playerAccent,
      wheelColor: this.playerWheel,
      number: this.playerNumber
    }, extra);
  },
  recordWin(level, stars) {
    this.stars[level] = Math.max(this.stars[level], stars);
    this.unlockedUpTo = Math.max(this.unlockedUpTo, level + 1);
    this.save();
  }
};

// ========================= UTILITIES =========================
function $(id) { return document.getElementById(id); }
function el(tag, attrs={}, html='') {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (html) e.innerHTML = html;
  return e;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }
function rand(min, max) { return Math.random() * (max - min) + min; }

function buildSwatchRow(label, colors, selected, onPick) {
  const row = el('div', { class: 'builder-row' });

  const swatches = el('div', { class: 'builder-swatches' });
  colors.forEach(c => {

    sw.addEventListener('click', () => {
      swatches.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      onPick(c);
    });
    swatches.appendChild(sw);
  });
  row.appendChild(swatches);
  return row;
}

// ========================= LEVEL ENGINE =========================
let levelCleanup = null;
let levelState = null;

function cancelAnyLevel() {
  if (levelCleanup) try { levelCleanup(); } catch(e){}
  levelCleanup = null;
  levelState = null;
}

function startLevel(idx) {
  cancelAnyLevel();
  State.currentLevel = idx;
  showScreen('level');
  setProgress(0, 5);
  setInstruction(LEVELS[idx].title);
  $('gameArea').innerHTML = '';
  // delay slightly so screen swaps cleanly
  setTimeout(() => {
    window[LEVELS[idx].fn]();
  }, 200);
}

function setInstruction(text) {
  $('instruction').textContent = text;
}
function setProgress(done, total) {
  $('progressDisplay').textContent = `⭐ ${done}/${total}`;
}

function levelComplete(stars) {
  Audio.win();
  State.recordWin(State.currentLevel, stars);
  setTimeout(() => showWin(stars), 600);
}

function showWin(stars) {
  const ov = $('winOverlay');
  ov.classList.add('active');
  $('winText').textContent = ['NICE!', 'GREAT!', 'AWESOME!', 'WOW AJ!', 'SUPER!'][Math.floor(Math.random()*5)];
  $('winStars').innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = el('div', { class: 'win-star' }, i < stars ? '⭐' : '☆');
    $('winStars').appendChild(s);
    setTimeout(() => {
      s.classList.add('show');
      Audio.star();
    }, 400 + i * 350);
  }
  spawnConfetti();
  const cheers = ["Great job A J!", "Way to go A J!", "Wow A J! You did it!", "Super A J!", "You're so smart A J!"];
  setTimeout(() => Audio.speak(cheers[Math.floor(Math.random()*cheers.length)]), 1200);
}

function closeWin() {
  Audio.tap();
  $('winOverlay').classList.remove('active');
  // auto-advance to next level if available, else map
  const next = State.currentLevel + 1;
  if (next < LEVELS.length) {
    startLevel(next);
  } else {
    showScreen('map');
    renderMap();
  }
}

function spawnConfetti() {
  const colors = ['#ff5252','#ffeb3b','#42a5f5','#66bb6a','#ab47bc','#ffa726'];
  const wrap = el('div', { class: 'confetti' });
  for (let i = 0; i < 60; i++) {
    const p = el('div', { class: 'confetti-piece' });
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = Math.random() * 0.4 + 's';
    p.style.animationDuration = (1.5 + Math.random()) + 's';
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    wrap.appendChild(p);
  }
  $('app').appendChild(wrap);
  setTimeout(() => wrap.remove(), 3000);
}

// ========================= LEVEL 1: LETTER MATCH =========================
function levelLetterMatch() {
  const letters = ['A','B','C','D','E','F','J','M','S','T','O','R'];
  let round = 0;
  const total = 7;
  levelState = { round };

  function nextRound() {
    if (round >= total) {
      levelComplete(3);
      return;
    }
    setProgress(round, total);
    const target = letters[Math.floor(Math.random()*letters.length)];
    const distractors = pickN(letters.filter(l => l !== target), 2);
    const choices = shuffle([target, ...distractors]);
    const colors = ['blue','green','purple','orange'];
    const pickedColor = colors[Math.floor(Math.random()*colors.length)];

    const ga = $('gameArea');
    ga.innerHTML = `
      <div class="big-letter">${target}</div>
      <div class="choices" id="choices"></div>
    `;
    setInstruction(`Tap the letter ${target}!`);
    Audio.speak(`Find the letter ${target}!`);

    const cdiv = $('choices');
    choices.forEach(letter => {
      const colorClass = colors[Math.floor(Math.random()*colors.length)];
      const c = el('div', { class: `choice choice-letter ${colorClass} bounce` }, letter);
      c.addEventListener('click', () => {
        if (c.classList.contains('faded')) return;
        if (letter === target) {
          c.classList.remove('bounce'); c.classList.add('correct');
          Audio.good();
          Audio.speak(`${letter}! Yes!`);
          round++;
          setTimeout(nextRound, 1000);
        } else {
          c.classList.add('wrong');
          Audio.wrong();
          setTimeout(() => {
            c.classList.remove('wrong');
            c.classList.add('faded');
          }, 400);
        }
      });
      cdiv.appendChild(c);
    });
  }
  nextRound();
  levelCleanup = () => { levelState = null; };
}

  const total = 7;
  const colors = ['#e53935','#1e88e5','#fdd835','#43a047','#8e24aa','#fb8c00'];

  function nextRound() {
    if (round >= total) { levelComplete(3); return; }
    setProgress(round, total);
    const same = colors[Math.floor(Math.random()*colors.length)];
    let different;
    do { different = colors[Math.floor(Math.random()*colors.length)]; } while (different === same);
    // 3 cars: 2 same color, 1 different
    const cars = [
      { color: same, isOdd: false },
      { color: same, isOdd: false },

// ========================= LEVEL 6: MEMORY MATCH =========================
function levelMemory() {
  const palette = [
    { color:'#e53935', name:'red' },
    { color:'#1e88e5', name:'blue' },
    { color:'#fdd835', name:'yellow' },
    { color:'#43a047', name:'green' },
    { color:'#8e24aa', name:'purple' },
    { color:'#fb8c00', name:'orange' }
  ];
  const PAIRS = 6;
  const pairs = pickN(palette, PAIRS); // 6 pairs = 12 cards in 4x3 grid
  const deck = shuffle([...pairs, ...pairs].map((c, i) => ({...c, id: i})));
  let flipped = [];
  let matched = 0;
  let busy = false;

  const ga = $('gameArea');
  setInstruction(`Match the cars!`);
  Audio.speak(`Find the matching cars A J!`);
  const grid = el('div', { class: 'cards-grid', style: 'grid-template-columns: repeat(4, 1fr);' });
  setProgress(0, PAIRS);

  deck.forEach((card, idx) => {
    const cardEl = el('div', { class: 'card', 'data-idx': idx });
    cardEl.innerHTML = `<div class="card-inner">
      <div class="card-face card-back"></div>
      <div class="card-face card-front">${carSVG({ color: card.color, size: 'tiny' })}</div>
    </div>`;
    cardEl.addEventListener('click', () => {
      if (busy) return;
      if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
      cardEl.classList.add('flipped');
      Audio.tap();
      flipped.push({ card, el: cardEl });
      if (flipped.length === 2) {
        busy = true;
        const [a, b] = flipped;
        if (a.card.color === b.card.color && a.card.id !== b.card.id) {
          setTimeout(() => {
            a.el.classList.add('matched');
            b.el.classList.add('matched');
            Audio.good();
            matched++;
            setProgress(matched, PAIRS);
            flipped = []; busy = false;
            if (matched >= PAIRS) levelComplete(3);
          }, 600);
        } else {
          Audio.wrong();
          setTimeout(() => {
            a.el.classList.remove('flipped');
            b.el.classList.remove('flipped');
            flipped = []; busy = false;
          }, 1100);
        }
      }
    });
    grid.appendChild(cardEl);
  });
  ga.innerHTML = '';
  ga.appendChild(grid);
  levelCleanup = () => {};
}

// ========================= LEVEL 7: LETTER CATCH =========================
function levelCatch() {
  let caught = 0;
  const target = 12;
  setProgress(0, target);
  const ga = $('gameArea');
  ga.innerHTML = '';
  ga.style.position = 'relative';
  setInstruction(`Tap the letters!`);
  Audio.speak(`Tap the letters as they fall!`);

  const letters = ['A','B','C','D','E','F','J','M','S'];
  let active = [];
  let spawnInt, fallInt, stopped = false;

  const playArea = el('div', { style: 'position:absolute; inset:0; pointer-events:none;' });
  // attach to level screen below top bar
  const screen = $('screen-level');
  screen.appendChild(playArea);

  function spawnLetter() {
    if (stopped) return;
    const letter = letters[Math.floor(Math.random()*letters.length)];
    const x = 10 + Math.random() * 75;
    const ldiv = el('div', { class: 'falling-letter', style: `left:${x}vw; top:14vh; pointer-events:auto;` }, letter);
    let y = 14;
    ldiv.dataset.y = y;
    ldiv.addEventListener('click', () => {
      if (ldiv.classList.contains('caught')) return;
      ldiv.classList.add('caught');
      Audio.star();
      Audio.speak(letter);
      caught++;
      setProgress(caught, target);
      setTimeout(() => ldiv.remove(), 500);
      if (caught >= target) {
        stopped = true;
        clearInterval(spawnInt); clearInterval(fallInt);
        active.forEach(l => l.remove());
        playArea.remove();
        levelComplete(3);
      }
    });
    playArea.appendChild(ldiv);
    active.push(ldiv);
  }

  spawnInt = setInterval(spawnLetter, 1100);
  spawnLetter();

  fallInt = setInterval(() => {
    if (stopped) return;
    active = active.filter(l => l.parentNode);
    active.forEach(l => {
      let y = parseFloat(l.dataset.y) + 1.2;
      l.dataset.y = y;
      l.style.top = y + 'vh';
      if (y > 90) { l.remove(); }
    });
  }, 60);

  levelCleanup = () => {
    stopped = true;
    clearInterval(spawnInt); clearInterval(fallInt);
    if (playArea.parentNode) playArea.remove();
  };
}

// ========================= LEVEL: NUMBER LINE 1-10 =========================
function levelNumberLine() {
  const ga = $('gameArea');
  ga.innerHTML = `<div class="numline" id="numline"></div>`;
  const numline = $('numline');
  let target = 1;
  setInstruction(`Tap the 1!`);
  Audio.speak(`Let's count A J! Tap one!`);
  setProgress(0, 10);

  const cells = [];
  for (let n = 1; n <= 10; n++) {
    const cell = el('div', { class: 'numline-cell' + (n === 1 ? ' target' : '') }, String(n));
    cell.dataset.n = n;
    cell.addEventListener('click', () => {
      if (cell.classList.contains('done')) return;
      const num = parseInt(cell.dataset.n, 10);
      if (num === target) {
        cell.classList.remove('target');
        cell.classList.add('done');
        Audio.star();
        Audio.speak(String(target));
        target++;
        setProgress(target - 1, 10);
        if (target > 10) {
          Audio.speak("Ten! You counted to ten A J!");
          setTimeout(() => levelComplete(3), 1200);
        } else {
          setInstruction(`Tap the ${target}!`);
          cells[target - 1].classList.add('target');
        }
      } else {
        cell.classList.add('wrong');
        Audio.wrong();
        setTimeout(() => cell.classList.remove('wrong'), 400);
      }
    });
    numline.appendChild(cell);
    cells.push(cell);
  }
  levelCleanup = () => {};
}

// ========================= LEVEL: TRACE THE LETTER =========================
const TRACE_LETTERS = {
  'A': { strokes: [[[20,90],[50,12],[80,90]], [[33,55],[67,55]]], word: 'Apple' },
  'J': { strokes: [[[60,12],[60,68],[50,82],[35,82],[28,68]]], word: 'Jump' },
  'C': { strokes: [[[78,28],[58,15],[38,28],[26,52],[38,80],[58,93],[78,82]]], word: 'Car' },
  'L': { strokes: [[[30,12],[30,90],[78,90]]], word: 'Lightning' },
  'M': { strokes: [[[15,90],[20,15],[50,55],[80,15],[85,90]]], word: 'Mack' }
};
function levelTrace() {
  const letterKeys = Object.keys(TRACE_LETTERS);
  let round = 0;
  const total = 4;
  let usedLetters = [];

  function nextRound() {
    if (round >= total) { levelComplete(3); return; }
    setProgress(round, total);
    // pick a letter not used recently
    const available = letterKeys.filter(l => !usedLetters.includes(l));
    const pool = available.length ? available : letterKeys;
    const letter = pool[Math.floor(Math.random() * pool.length)];
    usedLetters.push(letter);
    if (usedLetters.length > 3) usedLetters.shift();
    setInstruction(`Trace the ${letter}!`);
    Audio.speak(`Trace the letter ${letter} A J! Drag your finger.`);

    const ga = $('gameArea');
    ga.innerHTML = `<div id="trace-wrap" style="display:flex;align-items:center;justify-content:center;"></div>`;
    const wrap = $('trace-wrap');

    const data = TRACE_LETTERS[letter];
    const strokes = data.strokes;
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'trace-svg');
    svg.setAttribute('viewBox', '0 0 100 100');

    // outline guide path
    strokes.forEach(stroke => {
      const guide = document.createElementNS(SVG_NS, 'polyline');
      guide.setAttribute('class', 'trace-outline');
      guide.setAttribute('points', stroke.map(p => p.join(',')).join(' '));
      svg.appendChild(guide);
    });

    // active progress polylines (one per stroke, built up as user drags)
    const progressLines = strokes.map(() => {
      const pl = document.createElementNS(SVG_NS, 'polyline');
      pl.setAttribute('class', 'trace-progress');
      pl.setAttribute('points', '');
      svg.appendChild(pl);
      return pl;
    });

    // dots
    const dotEls = [];
    strokes.forEach((stroke, si) => {
      const arr = [];
      stroke.forEach((p, pi) => {
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('cx', p[0]);
        c.setAttribute('cy', p[1]);
        c.setAttribute('r', pi === 0 ? 5 : 3.5);
        c.setAttribute('class', 'trace-dot' + (si === 0 && pi === 0 ? ' active' : ''));
        svg.appendChild(c);
        arr.push(c);
      });
      dotEls.push(arr);
    });

    wrap.appendChild(svg);

    // tracing state
    let curStroke = 0;
    let curPoint = 0; // next point to reach (0 means waiting at start)
    let dragging = false;

    function svgCoords(e) {
      const rect = svg.getBoundingClientRect();
      const x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) / rect.width * 100;
      const y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) / rect.height * 100;
      return [x, y];
    }
    function dist(a, b) { return Math.hypot(a[0]-b[0], a[1]-b[1]); }

    function setProgressLine(strokeIdx, points) {
      progressLines[strokeIdx].setAttribute('points', points.map(p => p.join(',')).join(' '));
    }

    function reachedStart(coords) {
      const startPt = strokes[curStroke][0];
      return dist(coords, startPt) < 12;
    }

    function tryAdvance(coords) {
      const stroke = strokes[curStroke];
      // collect all points already reached
      const reached = stroke.slice(0, curPoint + 1);
      // start by drawing from reached[last] to coords (live cursor)
      const live = [...reached, coords];
      setProgressLine(curStroke, live);

      // check next point
      if (curPoint + 1 < stroke.length) {
        const next = stroke[curPoint + 1];
        if (dist(coords, next) < 12) {
          curPoint++;
          dotEls[curStroke][curPoint].classList.remove('active');
          dotEls[curStroke][curPoint].classList.add('done');
          Audio.star();
          // glow next
          if (curPoint + 1 < stroke.length) {
            // (we don't pre-mark all dots active — only first; but we can flash next)
          }
          // if reached end of stroke
          if (curPoint === stroke.length - 1) {
            setProgressLine(curStroke, stroke); // snap to clean
            Audio.good();
            if (curStroke + 1 < strokes.length) {
              curStroke++;
              curPoint = 0;
              dotEls[curStroke][0].classList.add('active');
              dragging = false;
              Audio.speak("Now the next part!");
            } else {
              // letter complete
              dragging = false;
              completeLetter();
            }
          }
        }
      }
    }

    function completeLetter() {
      Audio.win();
      Audio.speak(`${letter}! ${letter} like ${data.word}!`);
      svg.style.transition = 'transform 0.4s';
      svg.style.transform = 'scale(1.1) rotate(2deg)';
      round++;
      setTimeout(nextRound, 1500);
    }

    function onDown(e) {
      e.preventDefault();
      const c = svgCoords(e);
      if (reachedStart(c)) {
        dragging = true;
        Audio.tap();
      }
    }
    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      const c = svgCoords(e);
      tryAdvance(c);
    }
    function onUp(e) {
      if (!dragging) return;
      dragging = false;
      // snap progress line to last reached point so it doesn't dangle
      const reached = strokes[curStroke].slice(0, curPoint + 1);
      setProgressLine(curStroke, reached);
    }

    svg.addEventListener('pointerdown', onDown);
    svg.addEventListener('pointermove', onMove);
    svg.addEventListener('pointerup', onUp);
    svg.addEventListener('pointercancel', onUp);
    svg.addEventListener('pointerleave', onUp);
    // touch fallbacks (some older devices)
    svg.addEventListener('touchstart', onDown, { passive: false });
    svg.addEventListener('touchmove', onMove, { passive: false });
    svg.addEventListener('touchend', onUp);
  }
  nextRound();
  levelCleanup = () => {};
}

// ========================= LEVEL: DRIVE! (steering) =========================
function levelDrive() {
  const screen = $('screen-level');
  $('gameArea').innerHTML = '';
  setInstruction(`Tap left or right to drive!`);
  Audio.speak(`Drive A J! Tap left or right to get the coins!`);
  Audio.vroom();

  const target = 10;
  let collected = 0;
  setProgress(0, target);

  const wrap = el('div', { class: 'drive-screen', id: 'driveWrap' });
  // 3 lanes: positions in vw — within the road area (roughly 8vw to 92vw, lanes at 25, 50, 75 of viewport)
  const LANES = [27, 50, 73]; // vw
  let laneIdx = 1;

  wrap.innerHTML = `
    <div class="drive-road">
      <div class="drive-lane-line" style="left: 33%;"></div>
      <div class="drive-lane-line" style="left: 66%;"></div>
    </div>
    <div class="drive-arrow left">⬅️</div>
    <div class="drive-arrow right">➡️</div>
    <div class="drive-car" id="driveCar" style="left: ${LANES[laneIdx]}vw;">${carSVG(State.playerCarOpts({ size: 'small' }))}</div>
    <div class="drive-tap-left" id="driveLeft"></div>
    <div class="drive-tap-right" id="driveRight"></div>
  `;
  screen.appendChild(wrap);

  let stopped = false;
  let coins = []; // {el, lane, y, hit}
  let spawnInt, fallInt;

  function moveLane(dir) {
    if (stopped) return;
    const newIdx = Math.max(0, Math.min(LANES.length - 1, laneIdx + dir));
    if (newIdx !== laneIdx) {
      laneIdx = newIdx;
      $('driveCar').style.left = LANES[laneIdx] + 'vw';
      Audio.tap();
    }
  }

  $('driveLeft').addEventListener('click', () => moveLane(-1));
  $('driveRight').addEventListener('click', () => moveLane(1));

  function spawnCoin() {
    if (stopped) return;
    const lane = Math.floor(Math.random() * LANES.length);
    const isStar = Math.random() < 0.4;
    const c = el('div', { class: 'drive-coin', style: `left:${LANES[lane]}vw; top:-12vmin;` }, isStar ? '⭐' : '🪙');
    wrap.appendChild(c);
    coins.push({ el: c, lane, y: -12, hit: false });
  }

  spawnInt = setInterval(spawnCoin, 950);
  spawnCoin();

  fallInt = setInterval(() => {
    if (stopped) return;
    coins = coins.filter(coin => {
      if (!coin.el.parentNode) return false;
      coin.y += 1.6; // vh per tick (60ms)
      coin.el.style.top = coin.y + 'vh';
      // car is at bottom: ~78vh from top (8vh from bottom + ~14vh car height) — when coin reaches ~70-82vh and lane matches, collect
      if (!coin.hit && coin.y > 70 && coin.y < 88 && coin.lane === laneIdx) {
        coin.hit = true;
        coin.el.classList.add('collected');
        Audio.star();
        collected++;
        setProgress(collected, target);
        setTimeout(() => coin.el.remove(), 400);
        if (collected >= target) {
          finish(true);
        }
        return false;
      }
      if (coin.y > 100) {
        coin.el.remove();
        return false;
      }
      return true;
    });
  }, 60);

  function finish(won) {
    if (stopped) return;
    stopped = true;
    clearInterval(spawnInt); clearInterval(fallInt);
    coins.forEach(c => c.el.remove());
    Audio.honk();
    Audio.speak("You got them all A J!");
    setTimeout(() => {
      wrap.remove();
      levelComplete(3);
    }, 800);
  }

  levelCleanup = () => {
    stopped = true;
    clearInterval(spawnInt); clearInterval(fallInt);
    if (wrap.parentNode) wrap.remove();
  };
}

// ========================= LEVEL 8: BIG RACE =========================
function levelRace() {
  const screen = $('screen-level');
  $('gameArea').innerHTML = '';
  setInstruction(`TAP TAP TAP!`);
  setProgress(0, 100);
  Audio.speak(`Tap fast to race! Go A J!`);
  Audio.vroom();

  const raceWrap = el('div', { class: 'race-screen', id: 'raceWrap' });
  raceWrap.innerHTML = `
    <div class="race-track">
      <div class="race-track-lines"></div>
    </div>
    <div class="race-finish" id="finish" style="top: 12vh;"></div>
    <div class="racer player" id="player" style="bottom:8vh;">${carSVG(State.playerCarOpts({ size:'small' }))}</div>
    <div class="racer opponent" id="opponent" style="bottom:8vh;">${truckSVG({ color:'#c62828', size:'small' })}</div>
    <div class="tap-zone" id="tapZone"></div>
  `;
  screen.appendChild(raceWrap);

  let progress = 0; // 0-100
  const target = 100;
  let opponentProgress = 0;
  let stopped = false;

  const tapZone = $('tapZone');
  function onTap() {
    if (stopped) return;
    progress = Math.min(target, progress + 4);
    Audio.tap();
    setProgress(Math.floor(progress), 100);
    updatePositions();
    if (progress >= target) finish('player');
  }
  tapZone.addEventListener('click', onTap);
  tapZone.addEventListener('touchstart', (e) => { e.preventDefault(); onTap(); });

  const oppInt = setInterval(() => {
    if (stopped) return;
    opponentProgress = Math.min(target, opponentProgress + (1.2 + Math.random()*0.7));
    updatePositions();
    if (opponentProgress >= target && progress < target) finish('opponent');
  }, 220);

  function updatePositions() {
    // player car climbs from 8vh up toward finish at 12vh? no — better: player stays put, finish line moves down toward them as progress increases
    // Implement: visual "track" — finish line stays near top; player moves up
    const playerBottom = 8 + (progress / target) * 70; // 8vh -> 78vh
    const oppBottom = 8 + (opponentProgress / target) * 70;
    $('player').style.bottom = playerBottom + 'vh';
    $('opponent').style.bottom = oppBottom + 'vh';
  }

  function finish(who) {
    if (stopped) return;
    stopped = true;
    clearInterval(oppInt);
    Audio.honk();
    if (who === 'player') {
      Audio.speak(`A J wins! Hooray!`);
      setTimeout(() => {
        raceWrap.remove();
        levelComplete(3);
      }, 800);
    } else {
      // give 2 stars even if slow finish — kid friendly, no losing
      Audio.speak(`Good race A J!`);
      // nudge player to finish on their own
      const finishInt = setInterval(() => {
        progress = Math.min(target, progress + 6);
        updatePositions();
        if (progress >= target) {
          clearInterval(finishInt);
          setTimeout(() => { raceWrap.remove(); levelComplete(2); }, 600);
        }
      }, 100);
    }
  }

  levelCleanup = () => {
    stopped = true;
    clearInterval(oppInt);
    if (raceWrap.parentNode) raceWrap.remove();
  };
}

// ========================= INIT =========================
window.addEventListener('load', () => {
  State.load();
  renderHome();
  // Kick speech synth voices to load
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  // Init audio on first interaction
  const initAudio = () => {
    Audio.init(); Audio.resume();
    document.removeEventListener('touchstart', initAudio);
    document.removeEventListener('click', initAudio);
  };
  document.addEventListener('touchstart', initAudio, { once: true });
  document.addEventListener('click', initAudio, { once: true });
});

// prevent pinch zoom and double-tap zoom on iOS
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouch < 300) e.preventDefault();
  lastTouch = now;
}, { passive: false });
</script>
